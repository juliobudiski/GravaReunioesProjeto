services:
  # 1. O Banco de Dados (PostgreSQL)
  - type: postgres
    name: synapse-db
    plan: free

  # 2. O Backend (Python/Flask)
  - type: web
    name: synapse-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn --chdir backend/app main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: synapse-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0

  # 3. O Frontend (React/PWA)
  - type: web
    name: synapse-frontend
    env: static
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    # O Render redireciona todas as rotas para o index.html (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
